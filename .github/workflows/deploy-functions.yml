name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: |
          npm install -g supabase

      - name: Deploy Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase functions deploy --no-verify-jwt

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "Funções deployadas:"
          echo "- analyze-food-photo"
          echo "- analyze-label-photo"
          echo "- analyze-fridge-photo"
          echo "- generate-recipe"
          echo "- regenerate-meal"
          echo "- chat-assistant"
          echo "- generate-ai-meal-plan"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deploy falhou! Verifique os logs acima."
